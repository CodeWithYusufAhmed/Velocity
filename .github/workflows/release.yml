# Builds the signed release APK and attaches it to a GitHub Release on tag push.
# Required repo secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD.
name: release

on:
  push:
    tags: ["v*"]

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 -d > android/velocity-release.jks

      - name: Verify keystore (no secrets printed)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "decoded size: $(stat -c%s android/velocity-release.jks) bytes"
          echo "sha256: $(sha256sum android/velocity-release.jks | cut -d' ' -f1)"
          echo "alias secret is $([ -n "$KEY_ALIAS" ] && echo SET || echo EMPTY)"
          keytool -list -keystore android/velocity-release.jks -storepass "$KEYSTORE_PASSWORD" | head -8

      - name: Build signed APK
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/velocity-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename artifact
        run: cp android/app/build/outputs/apk/release/app-release.apk velocity-${{ github.ref_name }}.apk

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: velocity-${{ github.ref_name }}.apk
          generate_release_notes: true
