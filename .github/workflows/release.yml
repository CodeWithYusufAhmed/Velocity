# Builds the signed release APK and attaches it to a GitHub Release on tag push.
# Required repo secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD.
name: release

on:
  push:
    tags: ["v*"]

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode keystore (optional)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets are missing; building unsigned APK."
            exit 0
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/velocity-release.jks
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Build signed APK
        if: steps.keystore.outputs.enabled == 'true'
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/velocity-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Build unsigned APK
        if: steps.keystore.outputs.enabled != 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename artifact
        run: |
          apk_path="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk_path" ]; then
            apk_path="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          cp "$apk_path" velocity-${{ github.ref_name }}.apk

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: velocity-${{ github.ref_name }}.apk
          generate_release_notes: true
